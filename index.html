<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platinum Custom Apparel</title>
  <meta name="description" content="Custom apparel for schools, teams, businesses, families and special events." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sparkles" aria-hidden="true"></div>
  <div class="hearts" aria-hidden="true"></div>

  <main class="page">
    <section class="hero">
      <img src="logo.png" class="logo" alt="Platinum Custom Apparel logo">
      <h1 id="tagline"></h1>
      <p id="description"></p>
    </section>

    <section class="buttons">
      <a id="quoteLink" class="big-button primary" target="_blank" rel="noopener"><span class="icon">♡</span><span id="quoteText"></span><span class="arrow">›</span></a>
      <a id="websiteLink" class="big-button" target="_blank" rel="noopener"><span class="icon">◎</span><span id="websiteText"></span><span class="arrow">›</span></a>
      <a id="contactLink" class="big-button"><span class="icon">✉</span><span id="contactText"></span><span class="arrow">›</span></a>
    </section>

    <section>
      <div class="script-heading">Let’s Connect</div>
      <div class="circle-row">
        <a id="instagramLink" class="circle-link" target="_blank" rel="noopener"><span class="circle instagram">◎</span><small>Instagram</small></a>
        <a id="facebookLink" class="circle-link" target="_blank" rel="noopener"><span class="circle facebook">f</span><small>Facebook</small></a>
        <a id="tiktokLink" class="circle-link" target="_blank" rel="noopener"><span class="circle tiktok">♪</span><small>TikTok</small></a>
      </div>
    </section>

    <section>
      <div class="section-heading">Payment Options</div>
      <div class="circle-row">
        <a id="venmoLink" class="circle-link" target="_blank" rel="noopener"><span class="circle venmo">V</span><small>Venmo</small></a>
        <a id="cashappLink" class="circle-link" target="_blank" rel="noopener"><span class="circle cashapp">$</span><small>Cash App</small></a>
        <a id="paypalLink" class="circle-link" target="_blank" rel="noopener"><span class="circle paypal">P</span><small>PayPal</small></a>
      </div>
    </section>

    <section class="services">
      <div class="section-heading">Services We Offer</div>
      <div id="serviceGrid" class="service-grid"></div>
    </section>

    <section class="bottom-cards">
      <a id="reviewLink" class="bottom-card" target="_blank" rel="noopener">
        <div class="card-symbol">☆</div><div class="stars">★★★★★</div><strong>Leave a Review</strong><em>Your support means<br>the world! ♡</em>
      </a>
      <a class="bottom-card" href="contact.vcf">
        <div class="card-symbol">▣</div><strong>Save My Contact</strong><em>Tap to save my info<br>to your phone! ♡</em>
      </a>
    </section>

    <footer><div id="footerText"></div><small>MADE WITH PASSION · MADE FOR YOU</small></footer>
  </main>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
