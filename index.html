<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platinum Custom Apparel</title>
<meta name="description" content="Premium custom apparel for schools, teams, businesses, families and special events.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@600;700;800;900&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="background-grid"></div><div class="ambient-orbs"><span></span><span></span><span></span></div>
<main class="page">
<section class="hero">
<div class="logo-wrap"><img src="logo.png" class="logo" alt="Platinum Custom Apparel logo"></div>
<p class="eyebrow" id="eyebrow"></p><h1 id="headline"></h1><p class="subheadline" id="subheadline"></p>
</section>
<section class="actions">
<a id="quoteLink" class="action-card primary" target="_blank" rel="noopener"><span class="action-icon">↗</span><span><strong id="quoteText"></strong><small>Start your custom order</small></span><b>→</b></a>
<a id="websiteLink" class="action-card" target="_blank" rel="noopener"><span class="action-icon">◎</span><span><strong id="websiteText"></strong><small>View services and details</small></span><b>→</b></a>
<a id="contactLink" class="action-card"><span class="action-icon">✉</span><span><strong id="contactText"></strong><small>Questions before ordering?</small></span><b>→</b></a>
</section>
<section class="strip"><div class="socials"><a id="instagramLink">Instagram</a><a id="facebookLink">Facebook</a><a id="tiktokLink">TikTok</a></div><div class="payments"><a id="venmoLink">Venmo</a><a id="cashappLink">Cash App</a><a id="paypalLink">PayPal</a></div></section>
<section class="services"><div class="section-heading"><span>What We Do</span><p>Clean, custom apparel for the moments, teams, and brands that matter.</p></div><div id="serviceGrid" class="service-grid"></div></section>
<section class="bottom-actions"><a id="reviewLink" class="mini-card" target="_blank" rel="noopener"><span>★</span><strong>Leave a Review</strong></a><a href="contact.vcf" class="mini-card"><span>▣</span><strong>Save My Contact</strong></a></section>
<footer id="footerText"></footer>
</main>
<script src="config.js"></script><script src="script.js"></script>
</body></html>
