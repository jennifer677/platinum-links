<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Platinum Custom Apparel</title>
  <meta name="description" content="Custom apparel for schools, teams, businesses, families and special events." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="background-glitter" aria-hidden="true"></div>
  <div class="floating-hearts" aria-hidden="true"></div>

  <main class="landing">
    <section class="hero">
      <img class="logo" src="assets/logo.png" alt="Platinum Custom Apparel logo" />

      <div class="tagline" id="tagline"></div>
      <p class="description" id="description"></p>
    </section>

    <section class="buttons" aria-label="Main links">
      <a class="main-btn quote" id="quoteLink" target="_blank" rel="noopener">
        <span class="btn-icon heart-outline"></span>
        <span id="quoteText"></span>
        <span class="chevron"></span>
      </a>

      <a class="main-btn" id="websiteLink" target="_blank" rel="noopener">
        <span class="btn-icon globe-icon"></span>
        <span id="websiteText"></span>
        <span class="chevron"></span>
      </a>

      <a class="main-btn" id="contactLink">
        <span class="btn-icon envelope-icon"></span>
        <span id="contactText"></span>
        <span class="chevron"></span>
      </a>
    </section>

    <section class="connect">
      <div class="script-heading">Let’s Connect</div>
      <div class="round-row">
        <a class="round-link" id="instagramLink" target="_blank" rel="noopener" aria-label="Instagram">
          <span class="round-icon instagram-mark">◎</span>
          <span class="round-label">Instagram</span>
        </a>

        <a class="round-link" id="facebookLink" target="_blank" rel="noopener" aria-label="Facebook">
          <span class="round-icon fb-mark">f</span>
          <span class="round-label">Facebook</span>
        </a>

        <a class="round-link" id="tiktokLink" target="_blank" rel="noopener" aria-label="TikTok">
          <span class="round-icon tiktok-mark">♪</span>
          <span class="round-label">TikTok</span>
        </a>
      </div>
    </section>

    <section class="payments">
      <div class="block-heading">Payment Options</div>
      <div class="round-row payment-row">
        <a class="round-link" id="venmoLink" target="_blank" rel="noopener" aria-label="Venmo">
          <span class="round-icon venmo-mark">V</span>
          <span class="round-label">Venmo</span>
        </a>

        <a class="round-link" id="cashappLink" target="_blank" rel="noopener" aria-label="Cash App">
          <span class="round-icon cashapp-mark">$</span>
          <span class="round-label">Cash App</span>
        </a>

        <a class="round-link" id="paypalLink" target="_blank" rel="noopener" aria-label="PayPal">
          <span class="round-icon paypal-mark">P</span>
          <span class="round-label">PayPal</span>
        </a>
      </div>
    </section>

    <section class="services">
      <div class="block-heading">Services We Offer</div>
      <div class="service-grid" id="serviceGrid"></div>
    </section>

    <section class="bottom-actions">
      <a class="action-card" id="reviewLink" target="_blank" rel="noopener">
        <span class="card-big-icon star-outline"></span>
        <span class="stars">★★★★★</span>
        <strong>Leave a Review</strong>
        <em>Your support means<br>the world! ♡</em>
      </a>

      <a class="action-card contact-card" href="contact.vcf">
        <span class="card-big-icon contact-outline"></span>
        <strong>Save My Contact</strong>
        <em>Tap to save my info<br>to your phone! ↩</em>
      </a>
    </section>

    <footer>
      <div id="footerText"></div>
      <small>MADE WITH PASSION · MADE FOR YOU. ♥</small>
    </footer>
  </main>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
