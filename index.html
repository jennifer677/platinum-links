<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Platinum Custom Apparel</title>
  <meta name="description" content="Custom apparel for schools, teams, businesses, families and special events." />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="mockup-page">
    <img class="mockup-image" src="assets/mockup.png" alt="Platinum Custom Apparel Links Page" />

    <!-- Invisible clickable areas. Edit links in config.js. -->
    <a id="quoteLink" class="hotspot quote" target="_blank" rel="noopener" aria-label="Request a Quote"></a>
    <a id="websiteLink" class="hotspot website" target="_blank" rel="noopener" aria-label="Visit My Website"></a>
    <a id="contactLink" class="hotspot contact" aria-label="Contact Me"></a>

    <a id="instagramLink" class="hotspot instagram" target="_blank" rel="noopener" aria-label="Instagram"></a>
    <a id="facebookLink" class="hotspot facebook" target="_blank" rel="noopener" aria-label="Facebook"></a>
    <a id="tiktokLink" class="hotspot tiktok" target="_blank" rel="noopener" aria-label="TikTok"></a>

    <a id="venmoLink" class="hotspot venmo" target="_blank" rel="noopener" aria-label="Venmo"></a>
    <a id="cashappLink" class="hotspot cashapp" target="_blank" rel="noopener" aria-label="Cash App"></a>
    <a id="paypalLink" class="hotspot paypal" target="_blank" rel="noopener" aria-label="PayPal"></a>

    <a id="reviewLink" class="hotspot review" target="_blank" rel="noopener" aria-label="Leave a Review"></a>
    <a id="saveContactLink" class="hotspot save-contact" href="contact.vcf" aria-label="Save My Contact"></a>
  </main>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
