<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platinum Custom Apparel</title>
<meta name="description" content="Premium custom apparel for schools, teams, businesses, families and special events.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@600;700;800;900&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="background-grid"></div>
<div class="ambient-orbs"><span></span><span></span><span></span></div>

<main class="page">
<section class="hero">
<div class="logo-wrap"><img src="logo.png" class="logo" alt="Platinum Custom Apparel logo"></div>
<p class="eyebrow" id="eyebrow"></p>
<h1 id="headline"></h1>
<p class="subheadline" id="subheadline"></p>
</section>

<section class="actions">
<a id="quoteLink" class="action-card primary" target="_blank" rel="noopener"><span class="action-icon">↗</span><span><strong id="quoteText"></strong><small>Start your custom order</small></span><b>→</b></a>
<a id="websiteLink" class="action-card" target="_blank" rel="noopener"><span class="action-icon">◎</span><span><strong id="websiteText"></strong><small>View services and details</small></span><b>→</b></a>
<a id="contactLink" class="action-card"><span class="action-icon">✉</span><span><strong id="contactText"></strong><small>Questions before ordering?</small></span><b>→</b></a>
</section>

<section class="connection-panel">
  <div class="connect-block">
    <p class="micro-heading">Connect</p>
    <div class="icon-row socials">
      <a id="instagramLink" class="icon-button instagram" target="_blank" rel="noopener">
        <span class="brand-icon"><svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="4"></rect><circle cx="12" cy="12" r="3.2"></circle><circle cx="16.7" cy="7.3" r=".7"></circle></svg></span>
        <small>Instagram</small>
      </a>
      <a id="facebookLink" class="icon-button facebook" target="_blank" rel="noopener">
        <span class="brand-icon"><svg viewBox="0 0 24 24"><path d="M14 8h2V5h-2c-2.2 0-4 1.8-4 4v2H8v3h2v6h3v-6h2.4l.6-3h-3V9c0-.6.4-1 1-1z"></path></svg></span>
        <small>Facebook</small>
      </a>
      <a id="tiktokLink" class="icon-button tiktok" target="_blank" rel="noopener">
        <span class="brand-icon"><svg viewBox="0 0 24 24"><path d="M14 4v9.2a4 4 0 1 1-3-3.9V12a1.7 1.7 0 1 0 1.2 1.6V4h2.4c.4 2 1.8 3.5 3.4 4.2V11c-1.5-.2-2.9-.9-4-2z"></path></svg></span>
        <small>TikTok</small>
      </a>
    </div>
  </div>

  <div class="connect-block">
    <p class="micro-heading">Payment Options</p>
    <div class="payment-row">
      <a id="venmoLink" class="payment-card venmo" target="_blank" rel="noopener"><span>V</span><small>Venmo</small></a>
      <a id="cashappLink" class="payment-card cashapp" target="_blank" rel="noopener"><span>$</span><small>Cash App</small></a>
      <a id="paypalLink" class="payment-card paypal" target="_blank" rel="noopener"><span>P</span><small>PayPal</small></a>
    </div>
  </div>
</section>

<section class="services">
<div class="section-heading"><span>What We Do</span><p>Clean, custom apparel for the moments, teams, and brands that matter.</p></div>
<div id="serviceGrid" class="service-grid"></div>
</section>

<section class="bottom-actions">
<a id="reviewLink" class="mini-card" target="_blank" rel="noopener"><span>★</span><strong>Leave a Review</strong></a>
<a href="contact.vcf" class="mini-card"><span>▣</span><strong>Save My Contact</strong></a>
</section>

<footer id="footerText"></footer>
</main>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
